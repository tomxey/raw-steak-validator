services:
  website:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: website
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
